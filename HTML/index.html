  <!doctype html>
  <html>
  <head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/p5.js"></script>
<script src="https://unpkg.com/qrcode-generator@1.4.4/qrcode.js"></script>
<script src="../JS/p5.js"></script>
<link rel="stylesheet" href="../CSS/style.css">
</head>
<body>
<div class="wrapper">
  <header class="header">
    <div class="header-content">
      <h1 class="logo">QR Code Generator</h1>
      <p class="tagline">Create stunning QR codes instantly</p>
    </div>
  </header>

  <div class="main-container">
    <div class="content-section">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('url')">URL/LINK</button>
        <button class="tab-btn" onclick="switchTab('text')">Text</button>
        <button class="tab-btn" onclick="switchTab('file')">File</button>
      </div>

      <div class="form-container">
        <div id="url-tab" class="tab-content active">
          <label for="urlInput">Enter Website URL</label>
          <input id="urlInput" type="text" placeholder="https://example.com" class="input-field">
          <button class="btn btn-primary" onclick="generateQR('url')">Generate QR Code</button>
        </div>

        <div id="text-tab" class="tab-content">
          <label for="textInput">Enter Text</label>
          <input id="textInput" type="text" placeholder="Your text here..." class="input-field">
          <button class="btn btn-primary" onclick="generateQR('text')">Generate QR Code</button>
        </div>

        <div id="file-tab" class="tab-content">
          <label for="fileInput">Upload File</label>
          <div class="file-input-wrapper">
            <input id="fileInput" type="file" accept="image/*, video/*" class="file-input">
            <span class="file-label">Choose a file...</span>
          </div>
          <button class="btn btn-primary" onclick="generateQR('file')">Generate QR Code</button>
        </div>
      </div>
    </div>

    <div class="preview-section">
      <h2>Preview</h2>
      <div id="canvas-holder" class="canvas-container"></div>
      <button id="download-btn" class="btn btn-secondary">↓ Download QR Code</button>
    </div>
  </div>
</body>
</html>
